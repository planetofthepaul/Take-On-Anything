<style>
:root {
  --bg-app: #121218; --bg-toolbar: #18181f; --bg-tabs: #15151c;
  --bg-editor: #0d0d12; --bg-status: #15151c; --bg-footer: #0d0d12;
  --text-1: #e8e8ed; --text-2: #a0a0b0; --text-3: #6a6a7e;
  --accent: #ff4d6a; --accent-dim: rgba(255,77,106,0.15); --accent-hover: #ff6b84;
  --border: #252530; --border-lite: #2d2d3a;
  --surface: #1e1e28; --surface-hover: #25252f;
  --preview-bg: #fff; --radius: 5px;
  --toast-bg: #1e1e28; --toast-text: #e8e8ed; --toast-border: #353545;
}
[data-theme="light"] {
  --bg-app: #f4f4f1; --bg-toolbar: #ebebE6; --bg-tabs: #e2e2dc;
  --bg-editor: #fff; --bg-status: #e8e8e3; --bg-footer: #e2e2dc;
  --text-1: #1a1a24; --text-2: #6e6e7e; --text-3: #a0a0ae;
  --accent: #e03050; --accent-dim: rgba(224,48,80,0.1); --accent-hover: #c82848;
  --border: #d4d4cc; --border-lite: #ddddd6;
  --surface: #e8e8e2; --surface-hover: #ddddd7;
  --toast-bg: #fff; --toast-text: #1a1a24; --toast-border: #d4d4cc;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg-app);color:var(--text-1)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

.toolbar{display:flex;align-items:center;justify-content:space-between;height:48px;min-height:48px;padding:0 14px;background:var(--bg-toolbar);border-bottom:1px solid var(--border);z-index:10}
.toolbar-group{display:flex;align-items:center;gap:6px}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;letter-spacing:-0.3px;color:var(--accent);user-select:none;white-space:nowrap;text-decoration:none}
.logo .dim{color:var(--text-3);font-weight:400}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:30px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text-1);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:background .12s,border-color .12s,box-shadow .12s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--surface-hover);border-color:var(--border-lite)}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-accent:hover{background:var(--accent-hover);border-color:var(--accent-hover);box-shadow:0 0 12px var(--accent-dim)}
.btn-sq{padding:0;width:30px}
.btn.is-active{background:var(--accent);border-color:var(--accent);color:#fff}

.tabs-bar{display:flex;align-items:stretch;height:33px;min-height:33px;background:var(--bg-tabs);border-bottom:1px solid var(--border);padding-left:6px;gap:1px}
.tab-btn{display:flex;align-items:center;height:100%;padding:0 14px;border:none;background:transparent;color:var(--text-2);font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;cursor:pointer;position:relative;transition:color .12s;user-select:none}
.tab-btn:hover{color:var(--text-1)}
.tab-btn.active{color:var(--accent);background:var(--bg-editor);border-radius:var(--radius) var(--radius) 0 0}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}

.workspace{flex:1;display:flex;overflow:hidden}
.workspace.is-vertical{flex-direction:column}
.pane-editor{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-editor)}
.workspace:not(.is-vertical) .pane-editor{width:50%;min-width:180px}
.workspace.is-vertical .pane-editor{height:50%;min-height:80px}
.editor-wrap{flex:1;overflow:hidden}

.editor-wrap .CodeMirror{height:100%;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.55;background:var(--bg-editor)}
.editor-wrap .CodeMirror-gutters{background:var(--bg-editor);border-right:1px solid var(--border)}
.editor-wrap .CodeMirror-linenumber{color:var(--text-3);font-size:11px}
.editor-wrap .CodeMirror-cursor{border-left-color:var(--accent)}
.editor-wrap .CodeMirror-selected{background:var(--accent-dim)!important}

.resize-handle{flex-shrink:0;background:var(--border);transition:background .12s;z-index:5}
.resize-handle:hover,.resize-handle.is-dragging{background:var(--accent)}
.workspace:not(.is-vertical) .resize-handle{width:4px;cursor:col-resize}
.workspace.is-vertical .resize-handle{height:4px;cursor:row-resize}

.pane-preview{flex:1;overflow:hidden;position:relative;background:var(--preview-bg);min-width:180px;min-height:80px}
.preview-badge{position:absolute;top:7px;right:10px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#aaa;background:rgba(255,255,255,.8);padding:2px 6px;border-radius:3px;pointer-events:none;z-index:2}
.pane-preview iframe{width:100%;height:100%;border:none;background:#fff}

.statusbar{display:flex;align-items:center;justify-content:space-between;height:24px;min-height:24px;padding:0 12px;background:var(--bg-status);border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-3)}
.statusbar-group{display:flex;align-items:center;gap:14px}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#34d399;margin-right:4px}

.site-footer{display:flex;align-items:center;justify-content:space-between;height:32px;min-height:32px;padding:0 14px;background:var(--bg-footer);border-top:1px solid var(--border);font-size:12px;color:var(--text-3)}
.footer-links{display:flex;align-items:center;gap:16px}
.footer-links a{color:var(--text-3);text-decoration:none;transition:color .12s}
.footer-links a:hover{color:var(--text-2)}
.footer-copy{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3)}

.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--toast-bg);color:var(--toast-text);border:1px solid var(--toast-border);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.3);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;font-family:'Space Grotesk',system-ui,sans-serif}
.toast.is-visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

@media(max-width:640px){.toolbar{padding:0 8px}.hide-sm{display:none!important}.logo{font-size:12px}.site-footer{padding:0 8px}.footer-links{gap:10px}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>

<script>
(function() {
  'use strict';

  // Read defaults from hidden template tags (avoids string escaping issues)
  function getTemplate(id) {
    var el = document.getElementById(id);
    return el ? el.textContent : '';
  }

  var state = {
    theme: localStorage.getItem('toa-theme') || 'dark',
    layout: localStorage.getItem('toa-layout') || 'horizontal',
    activeTab: 'combined',
    code: {
      combined: localStorage.getItem('toa-combined') || getTemplate('default-combined'),
      html: localStorage.getItem('toa-html') || getTemplate('default-html'),
      css: localStorage.getItem('toa-css') || getTemplate('default-css'),
      js: localStorage.getItem('toa-js') || ''
    }
  };

  var $ = function(s) { return document.querySelector(s); };
  var $$ = function(s) { return document.querySelectorAll(s); };

  var workspace = $('#workspace');
  var editorWrap = $('#editorWrap');
  var editorPane = $('#editorPane');
  var previewPane = $('#previewPane');
  var resizeHandle = $('#resizeHandle');
  var previewFrame = $('#preview');
  var statusCursor = $('#statusCursor');
  var statusChars = $('#statusChars');
  var toastEl = $('#toast');

  var modeMap = { combined: 'htmlmixed', html: 'htmlmixed', css: 'css', js: 'javascript' };
  var editor;

  function initEditor() {
    editor = CodeMirror(editorWrap, {
      value: state.code[state.activeTab],
      mode: modeMap[state.activeTab],
      theme: state.theme === 'dark' ? 'dracula' : 'eclipse',
      lineNumbers: true, lineWrapping: true,
      autoCloseBrackets: true, autoCloseTags: true,
      matchBrackets: true, styleActiveLine: true,
      tabSize: 2, indentWithTabs: false,
      extraKeys: {
        'Ctrl-Enter': runCode, 'Cmd-Enter': runCode,
        'Tab': function(cm) {
          if (cm.somethingSelected()) cm.indentSelection('add');
          else cm.replaceSelection('  ', 'end');
        }
      }
    });
    editor.on('change', function() {
      state.code[state.activeTab] = editor.getValue();
      saveToStorage();
      updateStatus();
    });
    editor.on('cursorActivity', updateStatus);
    updateStatus();
  }

  // Tabs
  $$('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = this.dataset.tab;
      if (tab === state.activeTab) return;
      state.code[state.activeTab] = editor.getValue();
      state.activeTab = tab;
      $$('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      editor.setValue(state.code[tab]);
      editor.setOption('mode', modeMap[tab]);
      editor.focus();
      updateStatus();
    });
  });

  // Run
  function runCode() {
    state.code[state.activeTab] = editor.getValue();
    saveToStorage();
    var output;
    if (state.activeTab === 'combined') {
      output = state.code.combined;
    } else {
      var html = state.code.html;
      var css = state.code.css;
      var js = state.code.js;
      if (css.trim()) {
        var st = '<style>\n' + css + '\n</style>';
        if (html.indexOf('</head>') !== -1) html = html.replace('</head>', st + '\n</head>');
        else html = st + '\n' + html;
      }
      if (js.trim()) {
        var sc = '<scr' + 'ipt>\n' + js + '\n</scr' + 'ipt>';
        if (html.indexOf('</body>') !== -1) html = html.replace('</body>', sc + '\n</body>');
        else html = html + '\n' + sc;
      }
      output = html;
    }
    var doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
    doc.open();
    doc.write(output);
    doc.close();
  }

  $('#runBtn').addEventListener('click', runCode);

  // Share
  function compressToBase64(str) {
    try {
      var bytes = new TextEncoder().encode(str);
      var cs = new CompressionStream('deflate');
      var writer = cs.writable.getWriter();
      writer.write(bytes); writer.close();
      return new Response(cs.readable).arrayBuffer().then(function(buf) {
        var arr = new Uint8Array(buf); var bin = '';
        for (var i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
        return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      });
    } catch(e) {
      return Promise.resolve(btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''));
    }
  }

  function decompressFromBase64(encoded) {
    var b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    var pad = b64.length % 4;
    var padded = pad ? b64 + '===='.slice(pad) : b64;
    try {
      var bin = atob(padded);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      var ds = new DecompressionStream('deflate');
      var w = ds.writable.getWriter();
      w.write(bytes); w.close();
      return new Response(ds.readable).text();
    } catch(e) {
      try { return Promise.resolve(decodeURIComponent(escape(atob(padded)))); }
      catch(e2) { return Promise.resolve(''); }
    }
  }

  $('#shareBtn').addEventListener('click', function() {
    state.code[state.activeTab] = editor.getValue();
    var payload = JSON.stringify({ tab: state.activeTab, code: state.code });
    compressToBase64(payload).then(function(encoded) {
      var url = window.location.origin + window.location.pathname + '#code=' + encoded;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() { showToast('Shareable link copied!'); }).catch(function() { fallbackCopy(url); });
      } else { fallbackCopy(url); }
    });
  });

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('Shareable link copied!'); }
    catch(e) { showToast('Could not copy.'); }
    document.body.removeChild(ta);
  }

  function loadFromHash() {
    var hash = window.location.hash;
    if (!hash || hash.indexOf('#code=') !== 0) return false;
    decompressFromBase64(hash.slice(6)).then(function(json) {
      if (!json) return;
      try {
        var data = JSON.parse(json);
        if (data.code) {
          Object.keys(data.code).forEach(function(k) {
            if (state.code.hasOwnProperty(k)) state.code[k] = data.code[k];
          });
        }
        if (data.tab && modeMap[data.tab]) {
          state.activeTab = data.tab;
          $$('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === data.tab); });
        }
        if (editor) { editor.setValue(state.code[state.activeTab]); editor.setOption('mode', modeMap[state.activeTab]); }
        saveToStorage();
        setTimeout(runCode, 150);
        showToast('Loaded shared code');
      } catch(e) {}
    });
    return true;
  }

  // Toast
  var toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg; toastEl.classList.add('is-visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastEl.classList.remove('is-visible'); }, 2500);
  }

  // Theme
  function setTheme(theme) {
    state.theme = theme; document.body.dataset.theme = theme;
    localStorage.setItem('toa-theme', theme);
    if (editor) editor.setOption('theme', theme === 'dark' ? 'dracula' : 'eclipse');
    var icon = $('#themeIcon');
    icon.innerHTML = theme === 'light'
      ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
      : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
  $('#themeBtn').addEventListener('click', function() { setTheme(state.theme === 'dark' ? 'light' : 'dark'); });

  // Layout
  function setLayout(layout) {
    state.layout = layout; localStorage.setItem('toa-layout', layout);
    workspace.classList.toggle('is-vertical', layout === 'vertical');
    editorPane.style.width = ''; editorPane.style.height = '';
    $('#layoutH').classList.toggle('is-active', layout === 'horizontal');
    $('#layoutV').classList.toggle('is-active', layout === 'vertical');
    if (editor) editor.refresh();
  }
  $('#layoutH').addEventListener('click', function() { setLayout('horizontal'); });
  $('#layoutV').addEventListener('click', function() { setLayout('vertical'); });

  // Resize
  (function() {
    var dragging = false, startPos, startSize;
    resizeHandle.addEventListener('mousedown', onStart);
    resizeHandle.addEventListener('touchstart', onStart, { passive: false });
    function onStart(e) {
      e.preventDefault(); dragging = true; resizeHandle.classList.add('is-dragging');
      var t = e.touches ? e.touches[0] : e;
      var isV = state.layout === 'vertical';
      startPos = isV ? t.clientY : t.clientX;
      startSize = isV ? editorPane.offsetHeight : editorPane.offsetWidth;
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onEnd);
      previewPane.style.pointerEvents = 'none';
    }
    function onMove(e) {
      if (!dragging) return; e.preventDefault();
      var t = e.touches ? e.touches[0] : e;
      var isV = state.layout === 'vertical';
      var sz = Math.max(150, startSize + ((isV ? t.clientY : t.clientX) - startPos));
      if (isV) editorPane.style.height = sz + 'px'; else editorPane.style.width = sz + 'px';
      if (editor) editor.refresh();
    }
    function onEnd() {
      dragging = false; resizeHandle.classList.remove('is-dragging');
      previewPane.style.pointerEvents = '';
      document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd);
    }
  })();

  // Clear
  $('#clearBtn').addEventListener('click', function() {
    if (editor.getValue().trim() === '') return;
    editor.setValue(''); state.code[state.activeTab] = ''; saveToStorage();
  });

  // Status
  function updateStatus() {
    if (!editor) return;
    var c = editor.getCursor();
    statusCursor.textContent = 'Ln ' + (c.line + 1) + ', Col ' + (c.ch + 1);
    statusChars.textContent = editor.getValue().length.toLocaleString() + ' chars';
  }

  // Storage
  function saveToStorage() {
    try {
      localStorage.setItem('toa-combined', state.code.combined);
      localStorage.setItem('toa-html', state.code.html);
      localStorage.setItem('toa-css', state.code.css);
      localStorage.setItem('toa-js', state.code.js);
    } catch(e) {}
  }

  // Init
  setTheme(state.theme);
  setLayout(state.layout);
  initEditor();
  if (!loadFromHash()) setTimeout(runCode, 100);
  window.addEventListener('hashchange', function() { loadFromHash(); });
})();
</script>
</body>
</html>
